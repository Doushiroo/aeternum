modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/yourname/aeternum/issues"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description="""
        Aeternum — El Mod Definitivo.
        Clases, Profesiones, Clanes, Guerras, Territorios, Economía,
        Karma, Ángeles, Demonios, Jefes épicos, Sistema de Temperatura,
        Títulos dinámicos, Habilidades, y mucho más.
        El mundo nunca será el mismo.
    """

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
