name: Build Aeternum Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches

            ~/.gradle/wrapper
          key: gradle-8.8

      - name: Download Gradle 8.8 wrapper manually
        run: |
          mkdir -p gradle/wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.8-bin.zip -o gradle-8.8-bin.zip
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.8-bin.zip
          zipStoreBase=GRADLE_USER_HOME

          zipStorePath=wrapper/dists
          EOF
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: aeternum-mod
          path: build/libs/*.jar
          retention-days: 30
